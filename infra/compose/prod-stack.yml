services:
  db:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-lifeos}
      POSTGRES_USER: ${POSTGRES_USER:-lifeos}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change-me}
    volumes:
      - lifeos-postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-lifeos} -d ${POSTGRES_DB:-lifeos}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s

  migrate:
    build:
      context: ../..
      dockerfile: backend/Dockerfile
    restart: "no"
    env_file:
      - ../../.env
    environment:
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-lifeos}:${POSTGRES_PASSWORD:-change-me}@db:5432/${POSTGRES_DB:-lifeos}
      HOST: 0.0.0.0
      PORT: 8000
    depends_on:
      db:
        condition: service_healthy
    command: ["/app/infra/scripts/backend-migrate.sh"]

  api:
    build:
      context: ../..
      dockerfile: backend/Dockerfile
    restart: unless-stopped
    env_file:
      - ../../.env
    environment:
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-lifeos}:${POSTGRES_PASSWORD:-change-me}@db:5432/${POSTGRES_DB:-lifeos}
      HOST: 0.0.0.0
      PORT: 8000
    depends_on:
      migrate:
        condition: service_completed_successfully
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import http.client,sys; c=http.client.HTTPConnection('127.0.0.1', 8000, timeout=2); c.request('GET', '/health'); r=c.getresponse(); sys.exit(0 if r.status == 200 else 1)",
        ]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 20s

  reminders:
    build:
      context: ../..
      dockerfile: backend/Dockerfile
    restart: unless-stopped
    env_file:
      - ../../.env
    environment:
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-lifeos}:${POSTGRES_PASSWORD:-change-me}@db:5432/${POSTGRES_DB:-lifeos}
      REMINDER_DISPATCH_INTERVAL_SECONDS: ${REMINDER_DISPATCH_INTERVAL_SECONDS:-60}
      REMINDER_DISPATCH_LIMIT: ${REMINDER_DISPATCH_LIMIT:-50}
    depends_on:
      migrate:
        condition: service_completed_successfully
    command:
      [
        "python",
        "-m",
        "app.cli.run_reminder_worker",
        "--interval",
        "${REMINDER_DISPATCH_INTERVAL_SECONDS:-60}",
        "--limit",
        "${REMINDER_DISPATCH_LIMIT:-50}",
      ]

  web:
    build:
      context: ../..
      dockerfile: frontend/Dockerfile
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-/api/v1}
    restart: unless-stopped
    depends_on:
      api:
        condition: service_healthy
    ports:
      - "${WEB_PORT:-8080}:80"
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://127.0.0.1/ || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 10s

volumes:
  lifeos-postgres:
