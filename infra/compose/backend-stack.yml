services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: lifeos
      POSTGRES_USER: lifeos
      POSTGRES_PASSWORD: lifeos
    ports:
      - "5432:5432"
    volumes:
      - lifeos-postgres:/var/lib/postgresql/data

  migrate:
    build:
      context: ../..
      dockerfile: backend/Dockerfile
    environment:
      DATABASE_URL: postgresql+psycopg://lifeos:lifeos@db:5432/lifeos
      APP_API_TOKEN: bootstrap-token
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:-}
      WEB_APP_URL: http://localhost:5173
      ENABLE_WEB_PUSH: ${ENABLE_WEB_PUSH:-false}
      VAPID_PUBLIC_KEY: ${VAPID_PUBLIC_KEY:-}
      VAPID_PRIVATE_KEY: ${VAPID_PRIVATE_KEY:-}
    depends_on:
      - db
    command: ["/app/infra/scripts/backend-migrate.sh"]

  api:
    build:
      context: ../..
      dockerfile: backend/Dockerfile
    environment:
      DATABASE_URL: postgresql+psycopg://lifeos:lifeos@db:5432/lifeos
      APP_API_TOKEN: bootstrap-token
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:-}
      WEB_APP_URL: http://localhost:5173
      ENABLE_WEB_PUSH: ${ENABLE_WEB_PUSH:-false}
      VAPID_PUBLIC_KEY: ${VAPID_PUBLIC_KEY:-}
      VAPID_PRIVATE_KEY: ${VAPID_PRIVATE_KEY:-}
      HOST: 0.0.0.0
      PORT: 8000
    depends_on:
      - db
      - migrate
    ports:
      - "8000:8000"

  reminders:
    build:
      context: ../..
      dockerfile: backend/Dockerfile
    environment:
      DATABASE_URL: postgresql+psycopg://lifeos:lifeos@db:5432/lifeos
      APP_API_TOKEN: bootstrap-token
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:-}
      WEB_APP_URL: http://localhost:5173
      ENABLE_WEB_PUSH: ${ENABLE_WEB_PUSH:-false}
      VAPID_PUBLIC_KEY: ${VAPID_PUBLIC_KEY:-}
      VAPID_PRIVATE_KEY: ${VAPID_PRIVATE_KEY:-}
      REMINDER_DISPATCH_INTERVAL_SECONDS: 60
      REMINDER_DISPATCH_LIMIT: 50
    depends_on:
      - db
      - migrate
    command: ["python", "-m", "app.cli.run_reminder_worker", "--interval", "60"]

volumes:
  lifeos-postgres:
